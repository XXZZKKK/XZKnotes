site_name: My study notes
site_url: https://xxzzkkk.github.io/XZKnotes/
theme:
  name: material
  language: zh  # 设置为中文
  features:
    - navigation.tabs  # 开启顶部选项卡
    - search.suggest   # 搜索建议
    - search.highlight # 搜索关键词高亮
  palette:
    primary: indigo    # 主题颜色

markdown_extensions:
  - pymdownx.arithmatex: # 数学公式支持
      generic: true
  - pymdownx.highlight:  # 代码高亮支持
      anchor_linenums: true
  - pymdownx.superfences # 支持嵌套代码块

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Notes:
      - Note 1: notes/note1.md


